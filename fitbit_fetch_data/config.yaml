# Home Assistant Add-on config schema
# This replaces the single-user fields with a `users` list
# so the HA UI renders one collapsible entry per Fitbit account.

name: "Fitbit Fetch Data"
description: "Fetch Fitbit health data into InfluxDB – supports multiple users."
version: "2.0.0"
slug: fitbit_fetch_data
init: false
homeassistant_api: false
hassio_api: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

# ─── Shared InfluxDB settings (apply to all users) ────────────────────────────
options:
  influxdb_host: "localhost"
  influxdb_port: 8086
  influxdb_version: 2
  influxdb_username: ""
  influxdb_password: ""
  influxdb_database: "FitbitHealthStats"   # v1 bucket / v2 bucket
  influxdb_org: ""                          # v2 only
  influxdb_token: ""                        # v2 only
  influxdb_ssl: false
  auto_backfill: true
  backfill_days: 14

  # ─── Per-user list ────────────────────────────────────────────────────────────
  users:
    - username: "User1"
      refresh_token: ""
      client_id: ""
      client_secret: ""
      devicename: "Fitbit"
      local_timezone: "Automatic"

schema:
  influxdb_host: str
  influxdb_port: int
  influxdb_version: int
  influxdb_username: str
  influxdb_password: str
  influxdb_database: str
  influxdb_org: str
  influxdb_token: str
  influxdb_ssl: bool
  auto_backfill: bool
  backfill_days: int

  users:
    - username: str
      refresh_token: str
      client_id: str
      client_secret: str
      devicename: str
      local_timezone: str
